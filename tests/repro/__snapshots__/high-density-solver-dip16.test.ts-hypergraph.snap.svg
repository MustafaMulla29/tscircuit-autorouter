t="9.772" x="113.156" y="329.528" fill="rgba(255, 100, 255, 0.6)" stroke="#000" stroke-width=".031" data-type="rect" data-x="-6.2" data-y="1.462"/></g><g><rect width="9.772" height="9.772" x="517.072" y="424.752" fill="rgba(255, 100, 255, 0.6)" stroke="#000" stroke-width=".031" data-type="rect" data-x="6.2" data-y="-1.462"/></g><g><rect width="9.772" height="9.772" x="113.156" y="507.49" fill="rgba(255, 100, 255, 0.6)" stroke="#000" stroke-width=".031" data-type="rect" data-x="-6.2" data-y="-4.002"/></g><g><rect width="9.772" height="9.772" x="517.072" y="259.277" fill="rgba(255, 100, 255, 0.6)" stroke="#000" stroke-width=".031" data-type="rect" data-x="6.2" data-y="3.618"/></g><g><rect width="9.772" height="9.772" x="113.156" y="93.801" fill="rgba(255, 100, 255, 0.6)" stroke="#000" stroke-width=".031" data-type="rect" data-x="-6.2" data-y="8.698"/></g><g><rect width="9.772" height="9.772" x="517.072" y="120.946" fill="rgba(255, 100, 255, 0.6)" stroke="#000" stroke-width=".031" data-type="rect" data-x="6.2" data-y="7.865"/></g><g><rect width="9.772" height="9.772" x="113.156" y="259.277" fill="rgba(255, 100, 255, 0.6)" stroke="#000" stroke-width=".031" data-type="rect" data-x="-6.2" data-y="3.618"/></g><g><rect width="9.772" height="9.772" x="517.072" y="219.645" fill="rgba(255, 100, 255, 0.6)" stroke="#000" stroke-width=".031" data-type="rect" data-x="6.2" data-y="4.835"/></g><g><rect width="9.772" height="9.772" x="113.156" y="424.752" fill="rgba(255, 100, 255, 0.6)" stroke="#000" stroke-width=".031" data-type="rect" data-x="-6.2" data-y="-1.462"/></g><g><rect width="9.772" height="9.772" x="517.072" y="329.528" fill="rgba(255, 100, 255, 0.6)" stroke="#000" stroke-width=".031" data-type="rect" data-x="6.2" data-y="1.462"/></g><g><rect width="9.772" height="9.772" x="113.156" y="590.228" fill="rgba(255, 100, 255, 0.6)" stroke="#000" stroke-width=".031" data-type="rect" data-x="-6.2" data-y="-6.542"/></g><g><rect width="9.772" height="9.772" x="517.072" y="176.539" fill="rgba(255, 100, 255, 0.6)" stroke="#000" stroke-width=".031" data-type="rect" data-x="6.2" data-y="6.158"/></g><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":32.57392147358216,"c":0,"e":320,"b":0,"d":-32.57392147358216,"f":382.0261754726127};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>