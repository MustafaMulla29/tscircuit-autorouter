<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640"><rect width="100%" height="100%" fill="#fff"/><g><circle cx="189.333" cy="282.667" r="3" fill="#000" data-label="connectionA" data-type="point" data-x="-7" data-y="2"/></g><g><circle cx="506.667" cy="413.333" r="3" fill="#000" data-label="connectionA" data-type="point" data-x="10" data-y="-5"/></g><g><circle cx="189.333" cy="413.333" r="3" fill="#000" data-label="connectionB" data-type="point" data-x="-7" data-y="-5"/></g><g><circle cx="506.667" cy="413.333" r="3" fill="#000" data-label="connectionB" data-type="point" data-x="10" data-y="-5"/></g><g><circle cx="189.333" cy="282.667" r="3" fill="hsl(0, 100%, 50%)" data-label="connectionA (top)" data-type="point" data-x="-7" data-y="2"/></g><g><circle cx="506.667" cy="413.333" r="3" fill="hsl(0, 100%, 50%)" data-label="connectionA (top)" data-type="point" data-x="10" data-y="-5"/></g><g><circle cx="189.333" cy="413.333" r="3" fill="hsl(170, 100%, 50%)" data-label="connectionB (top)" data-type="point" data-x="-7" data-y="-5"/></g><g><circle cx="506.667" cy="413.333" r="3" fill="hsl(170, 100%, 50%)" data-label="connectionB (top)" data-type="point" data-x="10" data-y="-5"/></g><g><polyline fill="none" stroke="rgba(255,0,0,0.25)" stroke-width="1" points="40 600 600 600 600 40 40 40 40 600" data-points="-15,-15 15,-15 15,15 -15,15 -15,-15" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="3.733" points="189.333 413.333 183.367 366.667" data-points="-7,-5 -7.319642857142857,-2.5" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="3.733" points="183.367 366.667 183.367 329.333" data-points="-7.319642857142857,-2.5 -7.319642857142857,-0.5" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="3.733" points="183.367 329.333 189.333 282.667" data-points="-7.319642857142857,-0.5 -7,2" data-type="line"/></g><g><rect width="93.333" height="93.333" x="142.667" y="236" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".054" data-label="top, bottom" data-type="rect" data-x="-7" data-y="2"/></g><g><rect width="93.333" height="93.333" x="460" y="366.667" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".054" data-label="top, bottom" data-type="rect" data-x="10" data-y="-5"/></g><g><rect width="93.333" height="93.333" x="142.667" y="366.667" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".054" data-label="top, bottom" data-type="rect" data-x="-7" data-y="-5"/></g><g><rect width="93.333" height="93.333" x="142.667" y="236" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".054" data-type="rect" data-x="-7" data-y="2"/></g><g><rect width="93.333" height="93.333" x="460" y="366.667" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".054" data-type="rect" data-x="10" data-y="-5"/></g><g><rect width="93.333" height="93.333" x="142.667" y="366.667" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".054" data-type="rect" data-x="-7" data-y="-5"/></g><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":18.666666666666668,"c":0,"e":320,"b":0,"d":-18.666666666666668,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>