<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640"><rect width="100%" height="100%" fill="#fff"/><g><circle cx="136.393" cy="499.016" r="3" fill="#000" data-label="on-board-net" data-type="point" data-x="0" data-y="0"/></g><g><circle cx="320" cy="315.41" r="3" fill="#000" data-label="on-board-net" data-type="point" data-x="10" data-y="10"/></g><g><circle cx="503.607" cy="499.016" r="3" fill="#000" data-label="on-board-net" data-type="point" data-x="20" data-y="0"/></g><g><circle cx="320" cy="315.41" r="3" fill="#000" data-label="off-board-B" data-type="point" data-x="10" data-y="10"/></g><g><circle cx="320" cy="590.82" r="3" fill="#000" data-label="off-board-B" data-type="point" data-x="10" data-y="-5"/></g><g><circle cx="136.393" cy="499.016" r="3" fill="hsl(0, 100%, 50%)" data-label="on-board-net (top)" data-type="point" data-x="0" data-y="0"/></g><g><circle cx="320" cy="315.41" r="3" fill="hsl(0, 100%, 50%)" data-label="on-board-net (top)" data-type="point" data-x="10" data-y="10"/></g><g><circle cx="503.607" cy="499.016" r="3" fill="hsl(0, 100%, 50%)" data-label="on-board-net (top)" data-type="point" data-x="20" data-y="0"/></g><g><circle cx="320" cy="315.41" r="3" fill="hsl(170, 100%, 50%)" data-label="off-board-B (top)" data-type="point" data-x="10" data-y="10"/></g><g><circle cx="320" cy="590.82" r="3" fill="hsl(170, 100%, 50%)" data-label="off-board-B (top)" data-type="point" data-x="10" data-y="-5"/></g><g><polyline fill="none" stroke="rgba(255,0,0,0.25)" stroke-width="1" points="44.59 590.82 595.41 590.82 595.41 40 44.59 40 44.59 590.82" data-points="-5,-5 25,-5 25,25 -5,25 -5,-5" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="3.672" points="320 590.82 228.197 590.82" data-points="10,-5 5,-5" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="3.672" points="228.197 590.82 136.393 499.016" data-points="5,-5 0,0" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="3.672" points="320 590.82 411.803 590.82" data-points="10,-5 15,-5" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="3.672" points="411.803 590.82 503.607 499.016" data-points="15,-5 20,0" data-type="line"/></g><g><rect width="18.361" height="18.361" x="127.213" y="489.836" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".054" data-label="top" data-type="rect" data-x="0" data-y="0"/></g><g><rect width="18.361" height="18.361" x="310.82" y="306.23" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".054" data-label="top" data-type="rect" data-x="10" data-y="10"/></g><g><rect width="18.361" height="18.361" x="494.426" y="489.836" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".054" data-label="top" data-type="rect" data-x="20" data-y="0"/></g><g><rect width="18.361" height="18.361" x="310.82" y="581.639" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".054" data-label="top" data-type="rect" data-x="10" data-y="-5"/></g><g><rect width="18.361" height="18.361" x="127.213" y="489.836" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".054" data-type="rect" data-x="0" data-y="0"/></g><g><rect width="18.361" height="18.361" x="310.82" y="306.23" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".054" data-type="rect" data-x="10" data-y="10"/></g><g><rect width="18.361" height="18.361" x="494.426" y="489.836" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".054" data-type="rect" data-x="20" data-y="0"/></g><g><rect width="18.361" height="18.361" x="310.82" y="581.639" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".054" data-type="rect" data-x="10" data-y="-5"/></g><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":18.360655737704917,"c":0,"e":136.39344262295083,"b":0,"d":-18.360655737704917,"f":499.0163934426229};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>