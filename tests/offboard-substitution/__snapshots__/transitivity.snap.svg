<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640"><rect width="100%" height="100%" fill="#fff"/><g><circle cx="133.333" cy="506.667" r="3" fill="#000" data-label="on-board" data-type="point" data-x="0" data-y="0"/></g><g><circle cx="320" cy="320" r="3" fill="#000" data-label="on-board" data-type="point" data-x="10" data-y="10"/></g><g><circle cx="320" cy="320" r="3" fill="#000" data-label="off-board-1" data-type="point" data-x="10" data-y="10"/></g><g><circle cx="506.667" cy="133.333" r="3" fill="#000" data-label="off-board-1" data-type="point" data-x="20" data-y="20"/></g><g><circle cx="506.667" cy="133.333" r="3" fill="#000" data-label="off-board-2" data-type="point" data-x="20" data-y="20"/></g><g><circle cx="152" cy="488" r="3" fill="#000" data-label="off-board-2" data-type="point" data-x="1" data-y="1"/></g><g><circle cx="133.333" cy="506.667" r="3" fill="hsl(0, 100%, 50%)" data-label="on-board (top)" data-type="point" data-x="0" data-y="0"/></g><g><circle cx="320" cy="320" r="3" fill="hsl(0, 100%, 50%)" data-label="on-board (top)" data-type="point" data-x="10" data-y="10"/></g><g><circle cx="320" cy="320" r="3" fill="hsl(113.33333333333333, 100%, 50%)" data-label="off-board-1 (top)" data-type="point" data-x="10" data-y="10"/></g><g><circle cx="506.667" cy="133.333" r="3" fill="hsl(113.33333333333333, 100%, 50%)" data-label="off-board-1 (top)" data-type="point" data-x="20" data-y="20"/></g><g><circle cx="506.667" cy="133.333" r="3" fill="hsl(226.66666666666666, 100%, 50%)" data-label="off-board-2 (top)" data-type="point" data-x="20" data-y="20"/></g><g><circle cx="152" cy="488" r="3" fill="hsl(226.66666666666666, 100%, 50%)" data-label="off-board-2 (top)" data-type="point" data-x="1" data-y="1"/></g><g><polyline fill="none" stroke="rgba(255,0,0,0.25)" stroke-width="1" points="40 600 600 600 600 40 40 40 40 600" data-points="-5,-5 25,-5 25,25 -5,25 -5,-5" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="3.733" points="152 488 152 488" data-points="1,1 1,1" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="3.733" points="152 488 148.7 491.3" data-points="1,1 0.8232358038195422,0.8232358038195422" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="3.733" points="148.7 491.3 148.7 491.3" data-points="0.8232358038195422,0.8232358038195422 0.8232358038195422,0.8232358038195422" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="3.733" points="148.7 491.3 133.333 506.667" data-points="0.8232358038195422,0.8232358038195422 0,0" data-type="line"/></g><g><rect width="18.667" height="18.667" x="124" y="497.333" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".054" data-label="top" data-type="rect" data-x="0" data-y="0"/></g><g><rect width="18.667" height="18.667" x="310.667" y="310.667" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".054" data-label="top" data-type="rect" data-x="10" data-y="10"/></g><g><rect width="18.667" height="18.667" x="497.333" y="124" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".054" data-label="top" data-type="rect" data-x="20" data-y="20"/></g><g><rect width="18.667" height="18.667" x="142.667" y="478.667" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".054" data-label="top" data-type="rect" data-x="1" data-y="1"/></g><g><rect width="18.667" height="18.667" x="124" y="497.333" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".054" data-type="rect" data-x="0" data-y="0"/></g><g><rect width="18.667" height="18.667" x="310.667" y="310.667" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".054" data-type="rect" data-x="10" data-y="10"/></g><g><rect width="18.667" height="18.667" x="497.333" y="124" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".054" data-type="rect" data-x="20" data-y="20"/></g><g><rect width="18.667" height="18.667" x="142.667" y="478.667" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".054" data-type="rect" data-x="1" data-y="1"/></g><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":18.666666666666668,"c":0,"e":133.33333333333331,"b":0,"d":-18.666666666666668,"f":506.6666666666667};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>