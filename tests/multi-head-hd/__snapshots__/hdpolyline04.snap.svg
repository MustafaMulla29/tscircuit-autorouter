<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640"><rect width="100%" height="100%" fill="#fff"/><g><circle cx="40" cy="180" r="3" fill="hsl(90, 100%, 50%)" data-label="source_net_15_mst0 (Port z=0)" data-type="point" data-x="-27.439" data-y="-3.379"/></g><g><circle cx="600" cy="320" r="3" fill="hsl(90, 100%, 50%)" data-label="source_net_15_mst0 (Port z=1)" data-type="point" data-x="-26.224" data-y="-3.683"/></g><g><circle cx="40" cy="320" r="3" fill="hsl(270, 100%, 50%)" data-label="source_trace_60 (Port z=1)" data-type="point" data-x="-27.439" data-y="-3.683"/></g><g><circle cx="600" cy="180" r="3" fill="hsl(270, 100%, 50%)" data-label="source_trace_60 (Port z=0)" data-type="point" data-x="-26.224" data-y="-3.379"/></g><g><polyline fill="none" stroke="gray" stroke-width="1" points="40 600 600 600 600 40 40 40 40 600" data-points="-27.43948242343747,-4.290828821875001 -26.223968241796843,-4.290828821875001 -26.223968241796843,-3.0753146402343763 -27.43948242343747,-3.0753146402343763 -27.43948242343747,-4.290828821875001" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-width="69.107" points="40 180 180 154.333" data-label="source_net_15_mst0 segment (z=0)" data-points="-27.439482423437468,-3.3791931856445316 -27.13560387802724,-3.323482118985994" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-width="69.107" points="180 154.333 320 128.667" data-label="source_net_15_mst0 segment (z=0)" data-points="-27.13560387802724,-3.323482118985994 -26.83172533261701,-3.267771052327457" data-type="line"/></g><g><polyline fill="none" stroke="rgba(128,255,0,0.5)" stroke-dasharray=".15 .15" stroke-width="69.107" points="320 128.667 460 224.333" data-label="source_net_15_mst0 segment (z=1)" data-points="-26.83172533261701,-3.267771052327457 -26.527846787206926,-3.475421391691073" data-type="line"/></g><g><polyline fill="none" stroke="rgba(128,255,0,0.5)" stroke-dasharray=".15 .15" stroke-width="69.107" points="460 224.333 600 320" data-label="source_net_15_mst0 segment (z=1)" data-points="-26.527846787206926,-3.475421391691073 -26.223968241796843,-3.6830717310546888" data-type="line"/></g><g><polyline fill="none" stroke="rgba(128,0,255,0.5)" stroke-dasharray=".15 .15" stroke-width="69.107" points="40 320 180 380.926" data-label="source_trace_60 segment (z=1)" data-points="-27.439482423437468,-3.6830717310546888 -27.135603878027304,-3.8153151721128102" data-type="line"/></g><g><polyline fill="none" stroke="rgba(128,0,255,0.5)" stroke-dasharray=".15 .15" stroke-width="69.107" points="180 380.926 320 441.852" data-label="source_trace_60 segment (z=1)" data-points="-27.135603878027304,-3.8153151721128102 -26.83172533261714,-3.9475586131709317" data-type="line"/></g><g><polyline fill="none" stroke="hsl(270, 100%, 50%)" stroke-width="69.107" points="320 441.852 460 310.926" data-label="source_trace_60 segment (z=0)" data-points="-26.83172533261714,-3.9475586131709317 -26.52784678720699,-3.6633758994077317" data-type="line"/></g><g><polyline fill="none" stroke="hsl(270, 100%, 50%)" stroke-width="69.107" points="460 310.926 600 180" data-label="source_trace_60 segment (z=0)" data-points="-26.52784678720699,-3.6633758994077317 -26.223968241796843,-3.3791931856445316" data-type="line"/></g><circle cx="180" cy="154.333" r=".068" fill="hsl(90, 100%, 50%)" stroke="#000" stroke-width=".002" data-type="circle" data-x="-27.136" data-y="-3.323"/><circle cx="320" cy="128.667" r="69.107" fill="rgba(128,255,0,0.5)" stroke="#000" stroke-width=".002" data-type="circle" data-x="-26.832" data-y="-3.268"/><circle cx="460" cy="224.333" r=".068" fill="rgba(128,255,0,0.5)" stroke="#000" stroke-width=".002" data-type="circle" data-x="-26.528" data-y="-3.475"/><circle cx="180" cy="380.926" r=".068" fill="rgba(128,0,255,0.5)" stroke="#000" stroke-width=".002" data-type="circle" data-x="-27.136" data-y="-3.815"/><circle cx="320" cy="441.852" r="69.107" fill="rgba(128,0,255,0.5)" stroke="#000" stroke-width=".002" data-type="circle" data-x="-26.832" data-y="-3.948"/><circle cx="460" cy="310.926" r=".068" fill="hsl(270, 100%, 50%)" stroke="#000" stroke-width=".002" data-type="circle" data-x="-26.528" data-y="-3.663"/><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":460.71037957298483,"c":0,"e":12681.654362588124,"b":0,"d":-460.71037957298483,"f":-1376.8293752087359};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>