4,0,255,0.5)" stroke="#000" stroke-width=".006" data-type="circle" data-x="-165.651" data-y="7.352"/><circle cx="558.872" cy="209.163" r=".068" fill="hsl(252, 100%, 50%)" stroke="#000" stroke-width=".006" data-type="circle" data-x="-164.856" data-y="9.063"/><circle cx="519.829" cy="314.273" r=".068" fill="hsl(252, 100%, 50%)" stroke="#000" stroke-width=".006" data-type="circle" data-x="-165.09" data-y="8.433"/><circle cx="445.681" cy="417.771" r=".068" fill="hsl(252, 100%, 50%)" stroke="#000" stroke-width=".006" data-type="circle" data-x="-165.535" data-y="7.812"/><circle cx="376.227" cy="505.124" r=".068" fill="hsl(252, 100%, 50%)" stroke="#000" stroke-width=".006" data-type="circle" data-x="-165.952" data-y="7.288"/><circle cx="235.694" cy="231.151" r=".068" fill="hsl(180, 100%, 50%)" stroke="#000" stroke-width=".006" data-type="circle" data-x="-166.795" data-y="8.931"/><circle cx="437.748" cy="300.06" r="25.005" fill="rgba(0,255,255,0.5)" stroke="#000" stroke-width=".006" data-type="circle" data-x="-165.583" data-y="8.518"/><circle cx="505.414" cy="372.191" r=".068" fill="rgba(0,255,255,0.5)" stroke="#000" stroke-width=".006" data-type="circle" data-x="-165.177" data-y="8.085"/><circle cx="551.6" cy="423.223" r=".068" fill="rgba(0,255,255,0.5)" stroke="#000" stroke-width=".006" data-type="circle" data-x="-164.9" data-y="7.779"/><circle cx="68.236" cy="346.724" r=".068" fill="hsl(324, 100%, 50%)" stroke="#000" stroke-width=".006" data-type="circle" data-x="-167.799" data-y="8.238"/><circle cx="99.533" cy="405.053" r=".068" fill="hsl(324, 100%, 50%)" stroke="#000" stroke-width=".006" data-type="circle" data-x="-167.612" data-y="7.888"/><circle cx="135.742" cy="465.134" r=".068" fill="hsl(324, 100%, 50%)" stroke="#000" stroke-width=".006" data-type="circle" data-x="-167.394" data-y="7.528"/><circle cx="169.344" cy="531.946" r=".068" fill="hsl(324, 100%, 50%)" stroke="#000" stroke-width=".006" data-type="circle" data-x="-167.193" data-y="7.127"/><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":166.69767441860466,"c":0,"e":28040.000000000004,"b":0,"d":-166.69767441860466,"f":1720};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>