ints="-70.9954072655598,10.295341357812493 -70.74217514438467,11.510855539453118" data-type="line"/></g><g><polyline fill="none" stroke="rgba(0,64,255,0.5)" stroke-dasharray=".15 .15" stroke-width="17.277" points="92.5 460 121.667 320" data-label="source_net_5_mst1 segment (z=1)" data-points="-70.74217514438467,11.510855539453118 -70.48894302320954,12.726369721093743" data-type="line"/></g><g><polyline fill="none" stroke="rgba(0,64,255,0.5)" stroke-dasharray=".15 .15" stroke-width="17.277" points="121.667 320 150.833 180" data-label="source_net_5_mst1 segment (z=1)" data-points="-70.48894302320954,12.726369721093743 -70.23571090203441,13.941883902734366" data-type="line"/></g><g><polyline fill="none" stroke="rgba(0,64,255,0.5)" stroke-dasharray=".15 .15" stroke-width="17.277" points="150.833 180 180 40" data-label="source_net_5_mst1 segment (z=1)" data-points="-70.23571090203441,13.941883902734366 -69.98247878085928,15.157398084374991" data-type="line"/></g><g><polyline fill="none" stroke="rgba(0,255,255,0.5)" stroke-dasharray=".15 .15" stroke-width="17.277" points="40 110 107.929 78.167" data-label="source_net_0_mst4 segment (z=1)" data-points="-71.19799296249991,14.54964099355468 -70.60821708700331,14.826018563052621" data-type="line"/></g><g><polyline fill="none" stroke="hsl(180, 100%, 50%)" stroke-width="17.277" points="107.929 78.167 169.995 80.571" data-label="source_net_0_mst4 segment (z=0)" data-points="-70.60821708700331,14.826018563052621 -70.06934841563172,14.80514815510698" data-type="line"/></g><g><polyline fill="none" stroke="hsl(180, 100%, 50%)" stroke-width="17.277" points="169.995 80.571 232.06 82.975" data-label="source_net_0_mst4 segment (z=0)" data-points="-70.06934841563172,14.80514815510698 -69.53047974426013,14.784277747161338" data-type="line"/></g><g><polyline fill="none" stroke="rgba(0,255,255,0.5)" stroke-dasharray=".15 .15" stroke-width="17.277" points="232.06 82.975 600 180" data-label="source_net_0_mst4 segment (z=1)" data-points="-69.53047974426013,14.784277747161338 -66.33593623593741,13.941883902734368" data-type="line"/></g><circle cx="162.5" cy="460" r=".068" fill="hsl(315, 100%, 50%)" stroke="#000" stroke-width=".009" data-type="circle" data-x="-70.134" data-y="11.511"/><circle cx="261.667" cy="320" r=".068" fill="hsl(315, 100%, 50%)" stroke="#000" stroke-width=".009" data-type="circle" data-x="-69.273" data-y="12.726"/><circle cx="360.833" cy="180" r=".068" fill="hsl(315, 100%, 50%)" stroke="#000" stroke-width=".009" data-type="circle" data-x="-68.412" data-y="13.942"/><circle cx="110" cy="355" r=".068" fill="hsl(270, 100%, 50%)" stroke="#000" stroke-width=".009" data-type="circle" data-x="-70.59" data-y="12.422"/><circle cx="180" cy="250" r=".068" fill="hsl(270, 100%, 50%)" stroke="#000" stroke-width=".009" data-type="circle" data-x="-69.982" data-y="13.334"/><circle cx="250" cy="145" r=".068" fill="hsl(270, 100%, 50%)" stroke="#000" stroke-width=".009" data-type="circle" data-x="-69.375" data-y="14.246"/><circle cx="92.5" cy="460" r=".068" fill="rgba(0,64,255,0.5)" stroke="#000" stroke-width=".009" data-type="circle" data-x="-70.742" data-y="11.511"/><circle cx="121.667" cy="320" r=".068" fill="rgba(0,64,255,0.5)" stroke="#000" stroke-width=".009" data-type="circle" data-x="-70.489" data-y="12.726"/><circle cx="150.833" cy="180" r=".068" fill="rgba(0,64,255,0.5)" stroke="#000" stroke-width=".009" data-type="circle" data-x="-70.236" data-y="13.942"/><circle cx="107.929" cy="78.167" r="17.277" fill="rgba(0,255,255,0.5)" stroke="#000" stroke-width=".009" data-type="circle" data-x="-70.608" data-y="14.826"/><circle cx="169.995" cy="80.571" r=".068" fill="hsl(180, 100%, 50%)" stroke="#000" stroke-width=".009" data-type="circle" data-x="-70.069" data-y="14.805"/><circle cx="232.06" cy="82.975" r="17.277" fill="rgba(0,255,255,0.5)" stroke="#000" stroke-width=".009" data-type="circle" data-x="-69.53" data-y="14.784"/><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":115.17759489324655,"c":0,"e":8240.413590647033,"b":0,"d":-115.17759489324655,"f":1785.7926561978143};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>