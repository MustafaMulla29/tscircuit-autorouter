circle" data-x="-156.086" data-y="26.552"/><circle cx="81.674" cy="558.326" r=".068" fill="hsl(120, 100%, 50%)" stroke="#000" stroke-width=".003" data-type="circle" data-x="-156.086" data-y="25.32"/><circle cx="149.713" cy="533.277" r="50.009" fill="rgba(0,255,0,0.5)" stroke="#000" stroke-width=".003" data-type="circle" data-x="-155.882" data-y="25.395"/><circle cx="504.06" cy="558.326" r=".068" fill="rgba(0,255,0,0.5)" stroke="#000" stroke-width=".003" data-type="circle" data-x="-154.819" data-y="25.32"/><circle cx="527.852" cy="410.673" r="50.009" fill="rgba(0,255,0,0.5)" stroke="#000" stroke-width=".003" data-type="circle" data-x="-154.748" data-y="25.763"/><circle cx="393.436" cy="558.326" r=".068" fill="hsl(240, 100%, 50%)" stroke="#000" stroke-width=".003" data-type="circle" data-x="-155.151" data-y="25.32"/><circle cx="290.506" cy="336.574" r=".068" fill="hsl(240, 100%, 50%)" stroke="#000" stroke-width=".003" data-type="circle" data-x="-155.46" data-y="25.985"/><circle cx="234.14" cy="204.506" r=".068" fill="hsl(240, 100%, 50%)" stroke="#000" stroke-width=".003" data-type="circle" data-x="-155.629" data-y="26.382"/><circle cx="135.267" cy="205.147" r=".068" fill="hsl(240, 100%, 50%)" stroke="#000" stroke-width=".003" data-type="circle" data-x="-155.925" data-y="26.38"/><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":333.3953488372093,"c":0,"e":52120.00000000001,"b":0,"d":-333.3953488372093,"f":9000};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>