"-139.289" data-y="24.883"/><circle cx="325.598" cy="363.188" r=".068" fill="rgba(255,255,0,0.5)" stroke="#000" stroke-width=".003" data-type="circle" data-x="-138.557" data-y="24.223"/><circle cx="425.937" cy="516.705" r=".068" fill="rgba(255,255,0,0.5)" stroke="#000" stroke-width=".003" data-type="circle" data-x="-138.255" data-y="23.761"/><circle cx="104.354" cy="556.726" r=".068" fill="rgba(0,0,255,0.5)" stroke="#000" stroke-width=".003" data-type="circle" data-x="-139.223" data-y="23.641"/><circle cx="158.099" cy="531.654" r="49.855" fill="rgba(0,0,255,0.5)" stroke="#000" stroke-width=".003" data-type="circle" data-x="-139.061" data-y="23.716"/><circle cx="389.84" cy="539.377" r=".068" fill="hsl(240, 100%, 50%)" stroke="#000" stroke-width=".003" data-type="circle" data-x="-138.364" data-y="23.693"/><circle cx="176.467" cy="222.167" r=".068" fill="hsl(300, 100%, 50%)" stroke="#000" stroke-width=".003" data-type="circle" data-x="-139.006" data-y="24.647"/><circle cx="314.601" cy="210.937" r=".068" fill="hsl(300, 100%, 50%)" stroke="#000" stroke-width=".003" data-type="circle" data-x="-138.59" data-y="24.681"/><circle cx="453.325" cy="193.429" r=".068" fill="hsl(300, 100%, 50%)" stroke="#000" stroke-width=".003" data-type="circle" data-x="-138.173" data-y="24.734"/><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":332.36675098941345,"c":0,"e":46377.46285683376,"b":0,"d":-332.36675098941345,"f":8414.084155787956};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>