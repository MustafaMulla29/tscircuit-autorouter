<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640"><rect width="100%" height="100%" fill="#fff"/><g><circle cx="40" cy="600" r="3" fill="hsl(90, 100%, 50%)" data-label="A (Port z=0)" data-type="point" data-x="4" data-y="4"/></g><g><circle cx="600" cy="40" r="3" fill="hsl(90, 100%, 50%)" data-label="A (Port z=0)" data-type="point" data-x="6" data-y="6"/></g><g><circle cx="40" cy="40" r="3" fill="hsl(270, 100%, 50%)" data-label="B (Port z=0)" data-type="point" data-x="4" data-y="6"/></g><g><circle cx="600" cy="600" r="3" fill="hsl(270, 100%, 50%)" data-label="B (Port z=0)" data-type="point" data-x="6" data-y="4"/></g><g><polyline fill="none" stroke="gray" stroke-width="1" points="40 600 600 600 600 40 40 40 40 600" data-points="4,4 6,4 6,6 4,6 4,4" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-width="42" points="40 600 180 460" data-label="A segment (z=0)" data-points="4,4 4.5,4.5" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-width="42" points="180 460 320 320" data-label="A segment (z=0)" data-points="4.5,4.5 5,5" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-width="42" points="320 320 460 180" data-label="A segment (z=0)" data-points="5,5 5.5,5.5" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-width="42" points="460 180 600 40" data-label="A segment (z=0)" data-points="5.5,5.5 6,6" data-type="line"/></g><g><polyline fill="none" stroke="hsl(270, 100%, 50%)" stroke-width="42" points="40 40 320 133.333" data-label="B segment (z=0)" data-points="4,6 5,5.666666666666667" data-type="line"/></g><g><polyline fill="none" stroke="rgba(128,0,255,0.5)" stroke-dasharray=".15 .15" stroke-width="42" points="320 133.333 413.333 226.667" data-label="B segment (z=1)" data-points="5,5.666666666666667 5.333333333333334,5.333333333333334" data-type="line"/></g><g><polyline fill="none" stroke="rgba(128,0,255,0.5)" stroke-dasharray=".15 .15" stroke-width="42" points="413.333 226.667 506.667 320" data-label="B segment (z=1)" data-points="5.333333333333334,5.333333333333334 5.666666666666667,5" data-type="line"/></g><g><polyline fill="none" stroke="hsl(270, 100%, 50%)" stroke-width="42" points="506.667 320 600 600" data-label="B segment (z=0)" data-points="5.666666666666667,5 6,4" data-type="line"/></g><circle cx="180" cy="460" r=".068" fill="hsl(90, 100%, 50%)" stroke="#000" stroke-width=".004" data-type="circle" data-x="4.5" data-y="4.5"/><circle cx="320" cy="320" r=".068" fill="hsl(90, 100%, 50%)" stroke="#000" stroke-width=".004" data-type="circle" data-x="5" data-y="5"/><circle cx="460" cy="180" r=".068" fill="hsl(90, 100%, 50%)" stroke="#000" stroke-width=".004" data-type="circle" data-x="5.5" data-y="5.5"/><circle cx="320" cy="133.333" r="42" fill="rgba(128,0,255,0.5)" stroke="#000" stroke-width=".004" data-type="circle" data-x="5" data-y="5.667"/><circle cx="413.333" cy="226.667" r=".068" fill="rgba(128,0,255,0.5)" stroke="#000" stroke-width=".004" data-type="circle" data-x="5.333" data-y="5.333"/><circle cx="506.667" cy="320" r="42" fill="rgba(128,0,255,0.5)" stroke="#000" stroke-width=".004" data-type="circle" data-x="5.667" data-y="5"/><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":280,"c":0,"e":-1080,"b":0,"d":-280,"f":1720};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>