<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640"><rect width="100%" height="100%" fill="#fff"/><g><circle cx="40" cy="600" r="3" fill="hsl(90, 100%, 50%)" data-label="A (Port z=1)" data-type="point" data-x="4" data-y="4"/></g><g><circle cx="600" cy="40" r="3" fill="hsl(90, 100%, 50%)" data-label="A (Port z=0)" data-type="point" data-x="6" data-y="6"/></g><g><circle cx="320" cy="600" r="3" fill="hsl(270, 100%, 50%)" data-label="B (Port z=0)" data-type="point" data-x="5" data-y="4"/></g><g><circle cx="40" cy="40" r="3" fill="hsl(270, 100%, 50%)" data-label="B (Port z=1)" data-type="point" data-x="4" data-y="6"/></g><g><polyline fill="none" stroke="gray" stroke-width="1" points="40 600 600 600 600 40 40 40 40 600" data-points="4,4 6,4 6,6 4,6 4,4" data-type="line"/></g><g><polyline fill="none" stroke="rgba(128,255,0,0.5)" stroke-dasharray=".15 .15" stroke-width="42" points="40 600 248.444 494.222" data-label="A segment (z=1)" data-points="4,4 4.7444444444444445,4.377777777777778" data-type="line"/></g><g><polyline fill="none" stroke="rgba(128,255,0,0.5)" stroke-dasharray=".15 .15" stroke-width="42" points="248.444 494.222 456.889 388.444" data-label="A segment (z=1)" data-points="4.7444444444444445,4.377777777777778 5.488888888888889,4.755555555555556" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-width="42" points="456.889 388.444 528.444 214.222" data-label="A segment (z=0)" data-points="5.488888888888889,4.755555555555556 5.7444444444444445,5.377777777777778" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-width="42" points="528.444 214.222 600 40" data-label="A segment (z=0)" data-points="5.7444444444444445,5.377777777777778 6,6" data-type="line"/></g><g><polyline fill="none" stroke="hsl(270, 100%, 50%)" stroke-width="42" points="320 600 304.444 382.222" data-label="B segment (z=0)" data-points="5,4 4.944444444444444,4.777777777777777" data-type="line"/></g><g><polyline fill="none" stroke="hsl(270, 100%, 50%)" stroke-width="42" points="304.444 382.222 288.889 164.444" data-label="B segment (z=0)" data-points="4.944444444444444,4.777777777777777 4.8888888888888875,5.555555555555553" data-type="line"/></g><g><polyline fill="none" stroke="rgba(128,0,255,0.5)" stroke-dasharray=".15 .15" stroke-width="42" points="288.889 164.444 164.444 102.222" data-label="B segment (z=1)" data-points="4.8888888888888875,5.555555555555553 4.444444444444444,5.777777777777777" data-type="line"/></g><g><polyline fill="none" stroke="rgba(128,0,255,0.5)" stroke-dasharray=".15 .15" stroke-width="42" points="164.444 102.222 40 40" data-label="B segment (z=1)" data-points="4.444444444444444,5.777777777777777 4,6" data-type="line"/></g><circle cx="248.444" cy="494.222" r=".068" fill="rgba(128,255,0,0.5)" stroke="#000" stroke-width=".004" data-type="circle" data-x="4.744" data-y="4.378"/><circle cx="456.889" cy="388.444" r="42" fill="rgba(128,255,0,0.5)" stroke="#000" stroke-width=".004" data-type="circle" data-x="5.489" data-y="4.756"/><circle cx="528.444" cy="214.222" r=".068" fill="hsl(90, 100%, 50%)" stroke="#000" stroke-width=".004" data-type="circle" data-x="5.744" data-y="5.378"/><circle cx="304.444" cy="382.222" r=".068" fill="hsl(270, 100%, 50%)" stroke="#000" stroke-width=".004" data-type="circle" data-x="4.944" data-y="4.778"/><circle cx="288.889" cy="164.444" r="42" fill="rgba(128,0,255,0.5)" stroke="#000" stroke-width=".004" data-type="circle" data-x="4.889" data-y="5.556"/><circle cx="164.444" cy="102.222" r=".068" fill="rgba(128,0,255,0.5)" stroke="#000" stroke-width=".004" data-type="circle" data-x="4.444" data-y="5.778"/><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":280,"c":0,"e":-1080,"b":0,"d":-280,"f":1720};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>