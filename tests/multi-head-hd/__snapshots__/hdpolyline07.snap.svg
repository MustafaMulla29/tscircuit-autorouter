<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640"><rect width="100%" height="100%" fill="#fff"/><g><circle cx="250" cy="40" r="3" fill="hsl(90, 100%, 50%)" data-label="source_net_10_mst0 (Port z=1)" data-type="point" data-x="19.966" data-y="5.433"/></g><g><circle cx="390" cy="600" r="3" fill="hsl(90, 100%, 50%)" data-label="source_net_10_mst0 (Port z=0)" data-type="point" data-x="22.397" data-y="-4.291"/></g><g><circle cx="40" cy="530" r="3" fill="hsl(270, 100%, 50%)" data-label="source_net_15_mst1 (Port z=1)" data-type="point" data-x="16.319" data-y="-3.075"/></g><g><circle cx="530" cy="600" r="3" fill="hsl(270, 100%, 50%)" data-label="source_net_15_mst1 (Port z=0)" data-type="point" data-x="24.828" data-y="-4.291"/></g><g><polyline fill="none" stroke="gray" stroke-width="1" points="40 600 600 600 600 40 40 40 40 600" data-points="16.31902811562508,-4.290828821875005 26.04314156875008,-4.290828821875005 26.04314156875008,5.433284631249993 16.31902811562508,5.433284631249993 16.31902811562508,-4.290828821875005" data-type="line"/></g><g><polyline fill="none" stroke="rgba(128,255,0,0.5)" stroke-dasharray=".15 .15" stroke-width="8.638" points="250 40 215.957 307.574" data-label="source_net_10_mst0 segment (z=1)" data-points="19.965570660546955,5.433284631249993 19.374424642714892,0.7869983697435865" data-type="line"/></g><g><polyline fill="none" stroke="rgba(128,255,0,0.5)" stroke-dasharray=".15 .15" stroke-width="8.638" points="215.957 307.574 181.913 575.148" data-label="source_net_10_mst0 segment (z=1)" data-points="19.374424642714892,0.7869983697435865 18.783278624882826,-3.8592878917628197" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-width="8.638" points="181.913 575.148 285.957 587.574" data-label="source_net_10_mst0 segment (z=0)" data-points="18.783278624882826,-3.8592878917628197 20.589938824355514,-4.075058356818912" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-width="8.638" points="285.957 587.574 390 600" data-label="source_net_10_mst0 segment (z=0)" data-points="20.589938824355514,-4.075058356818912 22.396599023828205,-4.290828821875004" data-type="line"/></g><g><polyline fill="none" stroke="rgba(128,0,255,0.5)" stroke-dasharray=".15 .15" stroke-width="8.638" points="40 530 111.514 423.772" data-label="source_net_15_mst1 segment (z=1)" data-points="16.31902811562508,-3.07531464023438 17.560834769877985,-1.2307111928020913" data-type="line"/></g><g><polyline fill="none" stroke="rgba(128,0,255,0.5)" stroke-dasharray=".15 .15" stroke-width="8.638" points="111.514 423.772 183.028 317.543" data-label="source_net_15_mst1 segment (z=1)" data-points="17.560834769877985,-1.2307111928020913 18.802641424130893,0.6138922546301971" data-type="line"/></g><g><polyline fill="none" stroke="hsl(270, 100%, 50%)" stroke-width="8.638" points="183.028 317.543 356.514 458.772" data-label="source_net_15_mst1 segment (z=0)" data-points="18.802641424130893,0.6138922546301971 21.815134405620174,-1.838468283622403" data-type="line"/></g><g><polyline fill="none" stroke="hsl(270, 100%, 50%)" stroke-width="8.638" points="356.514 458.772 530 600" data-label="source_net_15_mst1 segment (z=0)" data-points="21.815134405620174,-1.838468283622403 24.827627387109455,-4.290828821875004" data-type="line"/></g><circle cx="215.957" cy="307.574" r=".068" fill="rgba(128,255,0,0.5)" stroke="#000" stroke-width=".017" data-type="circle" data-x="19.374" data-y=".787"/><circle cx="181.913" cy="575.148" r="8.638" fill="rgba(128,255,0,0.5)" stroke="#000" stroke-width=".017" data-type="circle" data-x="18.783" data-y="-3.859"/><circle cx="285.957" cy="587.574" r=".068" fill="hsl(90, 100%, 50%)" stroke="#000" stroke-width=".017" data-type="circle" data-x="20.59" data-y="-4.075"/><circle cx="111.514" cy="423.772" r=".068" fill="rgba(128,0,255,0.5)" stroke="#000" stroke-width=".017" data-type="circle" data-x="17.561" data-y="-1.231"/><circle cx="183.028" cy="317.543" r="8.638" fill="rgba(128,0,255,0.5)" stroke="#000" stroke-width=".017" data-type="circle" data-x="18.803" data-y=".614"/><circle cx="356.514" cy="458.772" r=".068" fill="hsl(270, 100%, 50%)" stroke="#000" stroke-width=".017" data-type="circle" data-x="21.815" data-y="-1.838"/><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":57.588797446623275,"c":0,"e":-899.7932046764831,"b":0,"d":-57.588797446623275,"f":352.89632809890713};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>