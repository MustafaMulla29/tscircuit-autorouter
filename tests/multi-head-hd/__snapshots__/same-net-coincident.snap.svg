 stroke="hsl(90, 100%, 50%)" stroke-dasharray="2 2" stroke-width="5.6" points="180.548 565 179.466 574.373" data-label="Force by A Via 1 on B mPoint 0" data-points="4.50195621157869,4.125 4.4980920209508435,4.0915235565311905" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-dasharray="2 2" stroke-width="5.6" points="180.548 565 180.519 565.089" data-label="Force by A Via 3 on B mPoint 0" data-points="4.50195621157869,4.125 4.501851940272316,4.124682980493386" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-dasharray="2 2" stroke-width="5.6" points="320.151 565 325.64 568.874" data-label="Force by A Seg 0-1 on B mPoint 1" data-points="5.000537965118625,4.125 5.020141494728738,4.111164812290607" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-dasharray="2 2" stroke-width="5.6" points="320.151 565 316.285 565.501" data-label="Force by A Seg 3-4 on B mPoint 1" data-points="5.000537965118625,4.125 4.986730389538321,4.123211178214184" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-dasharray="2 2" stroke-width="5.6" points="320.151 565 321.558 572.86" data-label="Force by A Via 1 on B mPoint 1" data-points="5.000537965118625,4.125 5.0055638907181415,4.096928467843544" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-dasharray="2 2" stroke-width="5.6" points="320.151 565 320.133 565.162" data-label="Force by A Via 3 on B mPoint 1" data-points="5.000537965118625,4.125 5.000475387861784,4.124419649003334" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-dasharray="2 2" stroke-width="5.6" points="459.647 565 460.441 565.862" data-label="Force by A Seg 0-1 on B mPoint 2" data-points="5.498738274579314,4.125 5.501573812413562,4.121921882332996" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-dasharray="2 2" stroke-width="5.6" points="459.647 565 450.013 568.442" data-label="Force by A Seg 3-4 on B mPoint 2" data-points="5.498738274579314,4.125 5.464331325878455,4.112708139960777" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-dasharray="2 2" stroke-width="5.6" points="459.647 565 461.41 568.1" data-label="Force by A Via 1 on B mPoint 2" data-points="5.498738274579314,4.125 5.505036711274207,4.113930139924666" data-type="line"/></g><g><polyline fill="none" stroke="hsl(90, 100%, 50%)" stroke-dasharray="2 2" stroke-width="5.6" points="459.647 565 459.657 565.179" data-label="Force by A Via 3 on B mPoint 2" data-points="5.498738274579314,4.125 5.498776740337311,4.124362231966725" data-type="line"/></g><circle cx="226.093" cy="411.788" r="42" fill="rgba(128,255,0,0.5)" stroke="#000" stroke-width=".004" data-type="circle" data-x="4.665" data-y="4.672"/><circle cx="320" cy="320" r=".068" fill="rgba(128,255,0,0.5)" stroke="#000" stroke-width=".004" data-type="circle" data-x="5" data-y="5"/><circle cx="413.699" cy="226.371" r="42" fill="rgba(128,255,0,0.5)" stroke="#000" stroke-width=".004" data-type="circle" data-x="5.335" data-y="5.334"/><circle cx="180.548" cy="565" r=".068" fill="hsl(270, 100%, 50%)" stroke="#000" stroke-width=".004" data-type="circle" data-x="4.502" data-y="4.125"/><circle cx="320.151" cy="565" r=".068" fill="hsl(270, 100%, 50%)" stroke="#000" stroke-width=".004" data-type="circle" data-x="5.001" data-y="4.125"/><circle cx="459.647" cy="565" r=".068" fill="hsl(270, 100%, 50%)" stroke="#000" stroke-width=".004" data-type="circle" data-x="5.499" data-y="4.125"/><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":280,"c":0,"e":-1080,"b":0,"d":-280,"f":1720};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>