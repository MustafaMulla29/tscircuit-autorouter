a(128, 0, 128, 0.1)" stroke="rgba(128, 0, 128, 0.1)" stroke-width=".019" data-label="nodeR4C3 (Section Node) Z: 0,1" data-type="rect" data-x="7" data-y="-5"/><text x="356.111" y="351.111" fill="rgba(128, 0, 128, 0.1)" dominant-baseline="text-before-edge" font-family="sans-serif" font-size="2.489">nodeR4C3 (Section Node) Z: 0,1</text></g><g><rect width="41.481" height="41.481" x="454.815" y="351.111" fill="rgba(128, 0, 128, 0.1)" stroke="rgba(128, 0, 128, 0.1)" stroke-width=".019" data-label="nodeD (Section Node) Z: 0,1" data-type="rect" data-x="9" data-y="-5"/><text x="459.815" y="351.111" fill="rgba(128, 0, 128, 0.1)" dominant-baseline="text-before-edge" font-family="sans-serif" font-size="2.489">nodeD (Section Node) Z: 0,1</text></g><g><rect width="41.481" height="41.481" x="454.815" y="143.704" fill="rgba(128, 0, 128, 0.1)" stroke="rgba(128, 0, 128, 0.1)" stroke-width=".019" data-label="nodeB1 (Section Node) Z: 0,1" data-type="rect" data-x="9" data-y="-1"/><text x="459.815" y="143.704" fill="rgba(128, 0, 128, 0.1)" dominant-baseline="text-before-edge" font-family="sans-serif" font-size="2.489">nodeB1 (Section Node) Z: 0,1</text></g><g><rect width="41.481" height="41.481" x="558.519" y="143.704" fill="rgba(128, 0, 128, 0.1)" stroke="rgba(128, 0, 128, 0.1)" stroke-width=".019" data-label="nodeB2 (Section Node) Z: 0,1" data-type="rect" data-x="11" data-y="-1"/><text x="563.519" y="143.704" fill="rgba(128, 0, 128, 0.1)" dominant-baseline="text-before-edge" font-family="sans-serif" font-size="2.489">nodeB2 (Section Node) Z: 0,1</text></g><g><rect width="41.481" height="41.481" x="454.815" y="454.815" fill="rgba(128, 0, 128, 0.1)" stroke="rgba(128, 0, 128, 0.1)" stroke-width=".019" data-label="nodeE (Section Node) Z: 0,1" data-type="rect" data-x="9" data-y="-7"/><text x="459.815" y="454.815" fill="rgba(128, 0, 128, 0.1)" dominant-baseline="text-before-edge" font-family="sans-serif" font-size="2.489">nodeE (Section Node) Z: 0,1</text></g><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":51.85185185185185,"c":0,"e":8.888888888888914,"b":0,"d":-51.85185185185185,"f":112.59259259259261};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>