"35.686" x="521.765" y="357.059" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".036" data-type="rect" data-x="8" data-y="-2"/></g><g><rect width="35.686" height="35.686" x="82.549" y="137.451" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".036" data-type="rect" data-x="-8" data-y="6"/></g><g><rect width="35.686" height="35.686" x="521.765" y="137.451" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".036" data-type="rect" data-x="8" data-y="6"/></g><g><rect width="35.686" height="35.686" x="82.549" y="466.863" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".036" data-type="rect" data-x="-8" data-y="-6"/></g><g><rect width="35.686" height="35.686" x="521.765" y="466.863" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".036" data-type="rect" data-x="8" data-y="-6"/></g><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":27.450980392156865,"c":0,"e":320,"b":0,"d":-27.450980392156865,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>