ata-type="rect" data-x="8.25" data-y="5.08"/></g><g><rect width="47.761" height="31.841" x="334.527" y="263.642" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".063" data-type="rect" data-x="8.25" data-y="2.54"/></g><g><rect width="47.761" height="31.841" x="334.527" y="304.08" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".063" data-type="rect" data-x="8.25" data-y="0"/></g><g><rect width="47.761" height="31.841" x="334.527" y="344.517" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".063" data-type="rect" data-x="8.25" data-y="-2.54"/></g><g><rect width="47.761" height="31.841" x="334.527" y="384.955" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".063" data-type="rect" data-x="8.25" data-y="-5.08"/></g><g><rect width="47.761" height="31.841" x="334.527" y="425.393" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".063" data-type="rect" data-x="8.25" data-y="-7.62"/></g><g><rect width="16.318" height="22.289" x="522.786" y="229.254" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".063" data-type="rect" data-x="19.087" data-y="5"/></g><g><rect width="16.318" height="22.289" x="551.841" y="229.254" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".063" data-type="rect" data-x="20.913" data-y="5"/></g><g><rect width="14.328" height="11.144" x="523.741" y="385.273" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".063" data-type="rect" data-x="19.085" data-y="-4.45"/></g><g><rect width="14.328" height="11.144" x="523.741" y="402.787" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".063" data-type="rect" data-x="19.085" data-y="-5.55"/></g><g><rect width="14.328" height="11.144" x="552.876" y="402.787" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".063" data-type="rect" data-x="20.915" data-y="-5.55"/></g><g><rect width="14.328" height="11.144" x="552.876" y="385.273" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".063" data-type="rect" data-x="20.915" data-y="-4.45"/></g><circle cx="507.264" cy="409.154" r="2.388" fill="#00f" stroke="none" stroke-width=".063" data-type="circle" data-x="17.6" data-y="-5.6"/><circle cx="481.791" cy="281.791" r="2.388" fill="#00f" stroke="none" stroke-width=".063" data-type="circle" data-x="16" data-y="2.4"/><circle cx="556.458" cy="417.911" r="2.388" fill="#00f" stroke="none" stroke-width=".063" data-type="circle" data-x="20.69" data-y="-6.15"/><circle cx="555.941" cy="318.408" r="2.388" fill="#00f" stroke="none" stroke-width=".063" data-type="circle" data-x="20.658" data-y=".1"/><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":15.920398009950251,"c":0,"e":227.0646766169154,"b":0,"d":-15.920398009950251,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>