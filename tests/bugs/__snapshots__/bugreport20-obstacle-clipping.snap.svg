<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640"><rect width="100%" height="100%" fill="#fff"/><g><circle cx="445.72" cy="320" r="3" fill="#000" data-label="source_trace_0 pcb_port_3" data-type="point" data-x="4.49" data-y="0"/></g><g><circle cx="305.72" cy="320" r="3" fill="#000" data-label="source_trace_0 pcb_port_2" data-type="point" data-x="-.51" data-y="0"/></g><g><circle cx="445.72" cy="320" r="3" fill="hsl(0, 100%, 50%)" data-label="source_trace_0 (top)" data-type="point" data-x="4.49" data-y="0"/></g><g><circle cx="305.72" cy="320" r="3" fill="hsl(0, 100%, 50%)" data-label="source_trace_0 (top)" data-type="point" data-x="-.51" data-y="0"/></g><g><polyline fill="none" stroke="rgba(255,0,0,0.25)" stroke-width="1" points="40 600 600 600 600 40 40 40 40 600" data-points="-10,-10 10,-10 10,10 -10,10 -10,-10" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.2" points="445.72 320 362.964 320" data-points="4.49,0 1.5344445737716137,0" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.2" points="362.964 320 351.064 308.1" data-points="1.5344445737716137,0 1.1094445737716137,0.425" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.2" points="351.064 308.1 343.8 308.1" data-points="1.1094445737716137,0.425 0.8499999999999996,0.425" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.2" points="343.8 308.1 336.8 308.1" data-points="0.8499999999999996,0.425 0.5999999999999994,0.425" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.2" points="336.8 308.1 331.2 308.1" data-points="0.5999999999999994,0.425 0.3999999999999994,0.425" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.2" points="331.2 308.1 324.2 308.1" data-points="0.3999999999999994,0.425 0.14999999999999947,0.425" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.2" points="324.2 308.1 317.2 308.1" data-points="0.14999999999999947,0.425 -0.10000000000000055,0.425" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.2" points="317.2 308.1 317.557 308.1" data-points="-0.10000000000000055,0.425 -0.08723458310201668,0.425" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.2" points="317.557 308.1 317.557 308.163" data-points="-0.08723458310201668,0.425 -0.08723458310201668,0.4227654168979833" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.2" points="317.557 308.163 305.72 320" data-points="-0.08723458310201668,0.4227654168979833 -0.51,0" data-type="line"/></g><g><rect width="15.12" height="17.92" x="298.16" y="311.04" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".036" data-label="top" data-type="rect" data-x="-.51" data-y="0"/></g><g><rect width="15.12" height="17.92" x="326.72" y="311.04" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".036" data-label="top" data-type="rect" data-x=".51" data-y="0"/></g><g><rect width="15.12" height="17.92" x="438.16" y="311.04" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".036" data-label="top" data-type="rect" data-x="4.49" data-y="0"/></g><g><rect width="15.12" height="17.92" x="466.72" y="311.04" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".036" data-label="top" data-type="rect" data-x="5.51" data-y="0"/></g><g><rect width="15.12" height="17.92" x="298.16" y="311.04" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".036" data-type="rect" data-x="-.51" data-y="0"/></g><g><rect width="15.12" height="17.92" x="326.72" y="311.04" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".036" data-type="rect" data-x=".51" data-y="0"/></g><g><rect width="15.12" height="17.92" x="438.16" y="311.04" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".036" data-type="rect" data-x="4.49" data-y="0"/></g><g><rect width="15.12" height="17.92" x="466.72" y="311.04" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".036" data-type="rect" data-x="5.51" data-y="0"/></g><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":28,"c":0,"e":320,"b":0,"d":-28,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>