<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640"><rect width="100%" height="100%" fill="#fff"/><g><circle cx="180.311" cy="444.444" r="3" fill="#000" data-label="source_trace_0 pcb_port_1" data-type="point" data-x="-4.49" data-y="-4"/></g><g><circle cx="491.422" cy="444.444" r="3" fill="#000" data-label="source_trace_0 pcb_port_3" data-type="point" data-x="5.51" data-y="-4"/></g><g><circle cx="180.311" cy="444.444" r="3" fill="hsl(0, 100%, 50%)" data-label="source_trace_0 (top)" data-type="point" data-x="-4.49" data-y="-4"/></g><g><circle cx="491.422" cy="444.444" r="3" fill="hsl(0, 100%, 50%)" data-label="source_trace_0 (top)" data-type="point" data-x="5.51" data-y="-4"/></g><g><polyline fill="none" stroke="rgba(255,0,0,0.25)" stroke-width="1" points="40 537.778 600 537.778 600 102.222 40 102.222 40 537.778" data-points="-9,-7 9,-7 9,7 -9,7 -9,-7" data-type="line"/></g><g><polyline fill="none" stroke="rgba(0, 136, 255, 0.95)" stroke-width="1" points="71.111 506.667 257.778 506.667 257.778 257.778 382.222 257.778 382.222 506.667 568.889 506.667 568.889 133.333 71.111 133.333 71.111 506.667" data-points="-8,-6 -2,-6 -2,2 2,2 2,-6 8,-6 8,6 -8,6 -8,-6" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.667" points="491.422 444.444 491.422 356.596" data-points="5.51,-4 5.51,-1.1762990767693848" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.667" points="491.422 356.596 330.382 195.556" data-points="5.51,-1.1762990767693848 0.3337009232306148,4" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.667" points="330.382 195.556 308.299 195.556" data-points="0.3337009232306148,4 -0.3760890129236083,4" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.667" points="308.299 195.556 180.94 322.915" data-points="-0.3760890129236083,4 -4.469780497657844,-0.09369148473423561" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.667" points="180.94 322.915 180.94 443.815" data-points="-4.469780497657844,-0.09369148473423561 -4.469780497657844,-3.9797804976578437" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.667" points="180.94 443.815 180.311 444.444" data-points="-4.469780497657844,-3.9797804976578437 -4.49,-4" data-type="line"/></g><g><rect width="16.8" height="19.911" x="140.178" y="434.489" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".032" data-label="top" data-type="rect" data-x="-5.51" data-y="-4"/></g><g><rect width="16.8" height="19.911" x="171.911" y="434.489" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".032" data-label="top" data-type="rect" data-x="-4.49" data-y="-4"/></g><g><rect width="16.8" height="19.911" x="451.289" y="434.489" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".032" data-label="top" data-type="rect" data-x="4.49" data-y="-4"/></g><g><rect width="16.8" height="19.911" x="483.022" y="434.489" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".032" data-label="top" data-type="rect" data-x="5.51" data-y="-4"/></g><g><rect width="16.8" height="19.911" x="140.178" y="434.489" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".032" data-type="rect" data-x="-5.51" data-y="-4"/></g><g><rect width="16.8" height="19.911" x="171.911" y="434.489" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".032" data-type="rect" data-x="-4.49" data-y="-4"/></g><g><rect width="16.8" height="19.911" x="451.289" y="434.489" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".032" data-type="rect" data-x="4.49" data-y="-4"/></g><g><rect width="16.8" height="19.911" x="483.022" y="434.489" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".032" data-type="rect" data-x="5.51" data-y="-4"/></g><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":31.11111111111111,"c":0,"e":320,"b":0,"d":-31.11111111111111,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>