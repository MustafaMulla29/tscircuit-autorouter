5,0.8)" stroke-width="37.542" points="274.637 193.296 274.637 243.352" data-points="-3.5000000000000004,10.493750000000002 -3.5000000000000004,10.293750000000003" data-type="line"/></g><g><polyline fill="none" stroke="rgba(0,0,255,0.8)" stroke-width="37.542" points="274.637 243.352 324.693 293.408" data-points="-3.5000000000000004,10.293750000000003 -3.3000000000000003,10.093750000000004" data-type="line"/></g><g><polyline fill="none" stroke="rgba(0,0,255,0.8)" stroke-width="37.542" points="324.693 293.408 374.749 343.464" data-points="-3.3000000000000003,10.093750000000004 -3.1,9.893750000000004" data-type="line"/></g><g><polyline fill="none" stroke="rgba(0,0,255,0.8)" stroke-width="37.542" points="374.749 343.464 424.804 393.52" data-points="-3.1,9.893750000000004 -2.9,9.693750000000005" data-type="line"/></g><g><polyline fill="none" stroke="rgba(0,0,255,0.8)" stroke-width="37.542" points="424.804 393.52 474.86 393.52" data-points="-2.9,9.693750000000005 -2.6999999999999997,9.693750000000005" data-type="line"/></g><g><polyline fill="none" stroke="rgba(0,0,255,0.8)" stroke-width="37.542" points="474.86 393.52 524.916 343.464" data-points="-2.6999999999999997,9.693750000000005 -2.4999999999999996,9.893750000000004" data-type="line"/></g><g><polyline fill="none" stroke="rgba(0,0,255,0.8)" stroke-width="37.542" points="524.916 343.464 574.972 293.408" data-points="-2.4999999999999996,9.893750000000004 -2.2999999999999994,10.093750000000004" data-type="line"/></g><g><polyline fill="none" stroke="rgba(0,0,255,0.8)" stroke-width="37.542" points="574.972 293.408 595.307 251.369" data-points="-2.2999999999999994,10.093750000000004 -2.21875,10.26171875" data-type="line"/></g><g><polyline fill="none" stroke="rgba(255, 0, 0, 0.25)" stroke-dasharray="4 4" stroke-width="1" points="40 598.436 595.307 598.436 595.307 43.128 40 43.128 40 598.436" data-points="-4.4375,8.875 -2.21875,8.875 -2.21875,11.09375 -4.4375,11.09375 -4.4375,8.875" data-type="line"/></g><circle cx="449.832" cy="216.76" r="75.084" fill="rgba(0,0,255,0.5)" stroke="#000" stroke-width=".004" data-type="circle" data-x="-2.8" data-y="10.4"/><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":250.27932960893855,"c":0,"e":1150.6145251396647,"b":0,"d":-250.27932960893855,"f":2819.664804469274};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>