"8.155339805825243" fill="rgba(52, 152, 219, 0.5)" stroke="black" stroke-width="0.018392857142857145"/><circle data-type="circle" data-label="" data-x="-2.452437999999999" data-y="-0.456503" cx="186.66356504854375" cy="344.8195805825243" r="8.155339805825243" fill="rgba(243, 156, 18, 0.5)" stroke="black" stroke-width="0.018392857142857145"/><circle data-type="circle" data-label="" data-x="-2.4985809999999993" data-y="0.692404" cx="184.15481941747578" cy="282.3547339805825" r="8.155339805825243" fill="rgba(243, 156, 18, 0.5)" stroke="black" stroke-width="0.018392857142857145"/><circle data-type="circle" data-label="" data-x="-3.802744999999999" data-y="-0.227118" cx="113.24881553398066" cy="332.3481631067961" r="8.155339805825243" fill="rgba(243, 156, 18, 0.5)" stroke="black" stroke-width="0.018392857142857145"/><circle data-type="circle" data-label="" data-x="0.5171450000000002" data-y="-0.456503" cx="348.1166213592233" cy="344.8195805825243" r="8.155339805825243" fill="rgba(243, 156, 18, 0.5)" stroke="black" stroke-width="0.018392857142857145"/><circle data-type="circle" data-label="" data-x="0.4710020000000002" data-y="0.692404" cx="345.60787572815536" cy="282.3547339805825" r="8.155339805825243" fill="rgba(243, 156, 18, 0.5)" stroke="black" stroke-width="0.018392857142857145"/><circle data-type="circle" data-label="" data-x="-0.8331619999999997" data-y="-0.227118" cx="274.7018718446602" cy="332.3481631067961" r="8.155339805825243" fill="rgba(243, 156, 18, 0.5)" stroke="black" stroke-width="0.018392857142857145"/><circle data-type="circle" data-label="" data-x="3.4867280000000003" data-y="-0.456503" cx="509.56967766990294" cy="344.8195805825243" r="8.155339805825243" fill="rgba(243, 156, 18, 0.5)" stroke="black" stroke-width="0.018392857142857145"/><circle data-type="circle" data-label="" data-x="3.440585" data-y="0.692404" cx="507.06093203883495" cy="282.3547339805825" r="8.155339805825243" fill="rgba(243, 156, 18, 0.5)" stroke="black" stroke-width="0.018392857142857145"/><circle data-type="circle" data-label="" data-x="2.1364210000000003" data-y="-0.227118" cx="436.1549281553398" cy="332.3481631067961" r="8.155339805825243" fill="rgba(243, 156, 18, 0.5)" stroke="black" stroke-width="0.018392857142857145"/><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":54.36893203883495,"c":0,"e":320,"b":0,"d":-54.36893203883495,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>