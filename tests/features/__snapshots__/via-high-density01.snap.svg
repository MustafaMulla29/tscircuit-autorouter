a-y=".273"/><circle cx="163.083" cy="358.345" r="8.155" fill="rgba(52, 152, 219, 0.5)" stroke="#000" stroke-width=".018" data-type="circle" data-x="-2.886" data-y="-.705"/><circle cx="318.423" cy="282.402" r="8.155" fill="rgba(52, 152, 219, 0.5)" stroke="#000" stroke-width=".018" data-type="circle" data-x="-.029" data-y=".692"/><circle cx="275.179" cy="305.168" r="8.155" fill="rgba(52, 152, 219, 0.5)" stroke="#000" stroke-width=".018" data-type="circle" data-x="-.824" data-y=".273"/><circle cx="324.536" cy="358.345" r="8.155" fill="rgba(52, 152, 219, 0.5)" stroke="#000" stroke-width=".018" data-type="circle" data-x=".083" data-y="-.705"/><circle cx="479.876" cy="282.402" r="8.155" fill="rgba(52, 152, 219, 0.5)" stroke="#000" stroke-width=".018" data-type="circle" data-x="2.941" data-y=".692"/><circle cx="436.632" cy="305.168" r="8.155" fill="rgba(52, 152, 219, 0.5)" stroke="#000" stroke-width=".018" data-type="circle" data-x="2.145" data-y=".273"/><circle cx="485.989" cy="358.345" r="8.155" fill="rgba(52, 152, 219, 0.5)" stroke="#000" stroke-width=".018" data-type="circle" data-x="3.053" data-y="-.705"/><circle cx="186.664" cy="344.82" r="8.155" fill="rgba(243, 156, 18, 0.5)" stroke="#000" stroke-width=".018" data-type="circle" data-x="-2.452" data-y="-.457"/><circle cx="184.155" cy="282.355" r="8.155" fill="rgba(243, 156, 18, 0.5)" stroke="#000" stroke-width=".018" data-type="circle" data-x="-2.499" data-y=".692"/><circle cx="113.249" cy="332.348" r="8.155" fill="rgba(243, 156, 18, 0.5)" stroke="#000" stroke-width=".018" data-type="circle" data-x="-3.803" data-y="-.227"/><circle cx="348.117" cy="344.82" r="8.155" fill="rgba(243, 156, 18, 0.5)" stroke="#000" stroke-width=".018" data-type="circle" data-x=".517" data-y="-.457"/><circle cx="345.608" cy="282.355" r="8.155" fill="rgba(243, 156, 18, 0.5)" stroke="#000" stroke-width=".018" data-type="circle" data-x=".471" data-y=".692"/><circle cx="274.702" cy="332.348" r="8.155" fill="rgba(243, 156, 18, 0.5)" stroke="#000" stroke-width=".018" data-type="circle" data-x="-.833" data-y="-.227"/><circle cx="509.57" cy="344.82" r="8.155" fill="rgba(243, 156, 18, 0.5)" stroke="#000" stroke-width=".018" data-type="circle" data-x="3.487" data-y="-.457"/><circle cx="507.061" cy="282.355" r="8.155" fill="rgba(243, 156, 18, 0.5)" stroke="#000" stroke-width=".018" data-type="circle" data-x="3.441" data-y=".692"/><circle cx="436.155" cy="332.348" r="8.155" fill="rgba(243, 156, 18, 0.5)" stroke="#000" stroke-width=".018" data-type="circle" data-x="2.136" data-y="-.227"/><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":54.36893203883495,"c":0,"e":320,"b":0,"d":-54.36893203883495,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>