73.333 320 268.637 323.878" data-points="-2,0 -2.2012608128924906,-0.1661899070156002" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.667" points="268.637 323.878 266.683 327.132" data-points="-2.2012608128924906,-0.1661899070156002 -2.285004098113753,-0.30567273619406604" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.667" points="266.683 327.132 270.252 317.526" data-points="-2.285004098113753,-0.30567273619406604 -2.132073129048334,0.10601828884081654" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.667" points="270.252 317.526 258.683 320.198" data-points="-2.132073129048334,0.10601828884081654 -2.627880155424124,-0.008496355394499718" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.667" points="258.683 320.198 252.851 320.113" data-points="-2.627880155424124,-0.008496355394499718 -2.8778258091251625,-0.004854689745838757" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.667" points="252.851 320.113 188.684 320.113" data-points="-2.8778258091251625,-0.004854689745838757 -5.627825809124227,-0.004852421550556751" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.667" points="188.684 320.113 182.851 320.055" data-points="-5.627825809124227,-0.004852421550556751 -5.877801797504184,-0.0023734069315650367" data-type="line"/></g><g><polyline fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="4.667" points="182.851 320.055 180 320" data-points="-5.877801797504184,-0.0023734069315650367 -6,0" data-type="line"/></g><g><rect width="23.333" height="23.333" x="168.333" y="308.333" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".043" data-label="obstacle top" data-type="rect" data-x="-6" data-y="0"/></g><g><rect width="23.333" height="23.333" x="261.667" y="308.333" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".043" data-label="obstacle offboardConnections: BC_NET top" data-type="rect" data-x="-2" data-y="0"/></g><g><rect width="23.333" height="23.333" x="355" y="308.333" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".043" data-label="obstacle offboardConnections: BC_NET top" data-type="rect" data-x="2" data-y="0"/></g><g><rect width="23.333" height="23.333" x="448.333" y="308.333" fill="rgba(255,0,0,0.25)" stroke="#000" stroke-width=".043" data-label="obstacle top" data-type="rect" data-x="6" data-y="0"/></g><g><rect width="23.333" height="23.333" x="168.333" y="308.333" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".043" data-type="rect" data-x="-6" data-y="0"/></g><g><rect width="23.333" height="23.333" x="261.667" y="308.333" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".043" data-type="rect" data-x="-2" data-y="0"/></g><g><rect width="23.333" height="23.333" x="355" y="308.333" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".043" data-type="rect" data-x="2" data-y="0"/></g><g><rect width="23.333" height="23.333" x="448.333" y="308.333" fill="rgba(255,0,0,0.5)" stroke="#000" stroke-width=".043" data-type="rect" data-x="6" data-y="0"/></g><g id="crosshair" style="display:none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width=".5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width=".5"/></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":23.333333333333332,"c":0,"e":320,"b":0,"d":-23.333333333333332,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>