name: Autorouting Benchmark

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]

jobs:
  post-instructions:
    name: Post benchmark instructions
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Post comment with benchmark instructions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## 🏃 Benchmark This PR

            Maintainers can run benchmarks on this PR by commenting:

            \`\`\`
            /benchmark [SolverName] [scenario-limit]
            \`\`\`

            **Examples:**
            - \`/benchmark\` - Run all solvers, all scenarios
            - \`/benchmark AutoroutingPipelineSolver3_HgPortPointPathing\` - Run with specific solver
            - \`/benchmark AutoroutingPipelineSolver3_HgPortPointPathing 10\` - Run with specific solver, 10 scenarios
            - \`/benchmark _ 20\` - Run all solvers, 20 scenarios`
            });

  setup:
    name: Setup benchmark
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      github.event.comment.user.type != 'Bot' &&
      startsWith(github.event.comment.body, '/benchmark') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    outputs:
      solvers: ${{ steps.parse.outputs.solvers }}
      scenario_limit: ${{ steps.parse.outputs.scenario_limit }}
      comment_id: ${{ steps.running-comment.outputs.comment_id }}
      sha: ${{ steps.parse.outputs.sha }}
    steps:
      - name: React to comment and post running status
        id: running-comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

            const comment = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🏃 Autorouting Benchmark\n\n⏳ Running benchmark... [View progress](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });
            core.setOutput('comment_id', comment.data.id);

      - name: Parse command and get PR info
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('sha', pr.data.head.sha);

            const comment = context.payload.comment.body;
            const match = comment.match(/\/benchmark(?:\s+(\S+))?(?:\s+(\d+))?/);
            const solverName = match && match[1] && match[1] !== '_' ? match[1] : '';
            const scenarioLimit = match && match[2] ? match[2] : '';

            const allSolvers = [
              'AutoroutingPipelineSolver',
              'AutoroutingPipelineSolver3_HgPortPointPathing',
              'AutoroutingPipeline1_OriginalUnravel',
              'AssignableAutoroutingPipeline2',
              'AssignableAutoroutingPipeline3'
            ];

            const solvers = solverName ? [solverName] : allSolvers;
            core.setOutput('solvers', JSON.stringify(solvers));
            core.setOutput('scenario_limit', scenarioLimit);

  benchmark:
    name: Benchmark ${{ matrix.solver }}
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        solver: ${{ fromJson(needs.setup.outputs.solvers) }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build autorouter
        run: bun run build

      - name: Install benchmark CLI
        run: bun add -g @tscircuit/autorouting-dataset-01

      - name: Create solver entry file
        run: |
          cat > benchmark-solver.ts << 'EOF'
          export * from "./lib"
          EOF

      - name: Run benchmark for ${{ matrix.solver }}
        id: benchmark
        run: |
          SCENARIO_LIMIT="${{ needs.setup.outputs.scenario_limit }}"
          CMD="autorouting-dataset-runner benchmark-solver.ts ${{ matrix.solver }}"

          if [ -n "$SCENARIO_LIMIT" ]; then
            CMD="$CMD --scenario-limit $SCENARIO_LIMIT"
          fi

          $CMD 2>&1 | tee /tmp/benchmark_output.txt || true

          # Extract the data row from the results table
          {
            echo "BENCHMARK_ROW<<EOFMARKER"
            grep -E "^\|" /tmp/benchmark_output.txt | grep -v "Solver" | grep -v "Completed" || true
            echo "EOFMARKER"
          } >> $GITHUB_OUTPUT

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.solver }}
          path: results/
          retention-days: 30

  report:
    name: Post benchmark results
    needs: [setup, benchmark]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download all benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results/
          pattern: benchmark-*

      - name: Post combined results
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Collect all result rows from artifact files
            let rows = [];
            const artifactsDir = 'all-results';
            if (fs.existsSync(artifactsDir)) {
              const dirs = fs.readdirSync(artifactsDir);
              for (const dir of dirs) {
                const dirPath = `${artifactsDir}/${dir}`;
                const files = fs.readdirSync(dirPath);
                for (const file of files) {
                  if (file.endsWith('.txt')) {
                    const content = fs.readFileSync(`${dirPath}/${file}`, 'utf8');
                    const dataRows = content.split('\n')
                      .filter(l => l.startsWith('|') && !l.includes('Solver') && !l.includes('Completed'));
                    rows.push(...dataRows);
                  }
                }
              }
            }

            // If no txt files found, try to parse from the HTML result files
            // Build table from benchmark job names
            const solvers = ${{ needs.setup.outputs.solvers }};
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.run_id }}
            });

            // Parse results from each solver's benchmark output
            let tableRows = '';
            for (const solver of solvers) {
              const job = jobs.data.jobs.find(j => j.name === `Benchmark ${solver}`);
              const status = job ? (job.conclusion === 'success' ? '✅' : '❌') : '⏳';

              // Try to find result row from artifacts
              const matchingRow = rows.find(r => r.includes(solver));
              if (matchingRow) {
                tableRows += matchingRow + '\n';
              } else {
                tableRows += `| ${solver.padEnd(45)} | ${status.padEnd(11)} | n/a                | n/a      | n/a      |\n`;
              }
            }

            const scenarioLimit = '${{ needs.setup.outputs.scenario_limit }}' || 'all';

            const table = `+-----------------------------------------------+-------------+--------------------+----------+----------+
            | Solver                                        | Completed % | Relaxed DRC Pass % | P50 Time | P95 Time |
            +-----------------------------------------------+-------------+--------------------+----------+----------+
            ${tableRows}+-----------------------------------------------+-------------+--------------------+----------+----------+`;

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ needs.setup.outputs.comment_id }},
              body: `## 🏃 Autorouting Benchmark Results

            **Solvers:** ${solvers.length} | **Scenarios:** ${scenarioLimit}

            \`\`\`
            ${table}
            \`\`\`

            📊 [Download HTML visualization and bundle](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)

            <sub>Triggered by @${{ github.event.comment.user.login }} • Commit: ${{ needs.setup.outputs.sha }}</sub>`
            });
